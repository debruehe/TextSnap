name: TextSnap
options:
  bundleIdPrefix: com.textsnap
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  TextSnap:
    type: application
    platform: macOS
    sources:
      - path: Sources/TextSnap
        excludes:
          - "**/*.entitlements"
          - "Icon.icon/**"         # icon composer source, not compiled
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.textsnap.app
        INFOPLIST_FILE: Sources/TextSnap/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/TextSnap/TextSnap.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Developer ID signing — set your Team ID here or let Xcode auto-manage
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: YES    # required for notarization
